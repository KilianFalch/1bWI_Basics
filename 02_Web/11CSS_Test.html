<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .rightcorner {
        position: fixed;
        border-style: solid;
        top: 0px;
        right: 0px;
        width: 50px;
        height: 50px;
        background-color: violet;
      }

      .main {
        background-color: white;
        width: 400px;
        height: 300px;
        position: relative;
        left: 20px;
        top: 20px;
        border-style: solid;
      }

      .bottomrightcorner{
        position: absolute;
        border-style: solid;
        bottom: 0px;
        background-color: orange;
        height: 100px;
        width: 100px;
        right: 0px;

        
      }

      .Willkommen {
        position: relative;
        top: 20px;
        left: 20px;
        font-size: 1.5rem;
      }

      .Title {
        position: relative;
        top: 30px;
    
      }





    </style>
  </head>
  <body>
    <div class="main">
      <div class="Willkommen">Willkommen!</div>
      <div class="Title">
        <ul>
          <li>Eins</li>
          <li>Zwei</li> 
          <li>Drei</li>
        </ul>
      </div>
      <div class="bottomrightcorner"></div>
     </div>
      <div class="rightcorner"></div>
      <div class="flexbox"></div>

  </body>
</html>
